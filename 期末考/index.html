<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>響應式網頁設計佈局練習</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <nav class="navbar">
            <div class="logo" id="main-logo">12153205 蔡昕宸</div>
            <ul class="nav-link">
                <li><a href='#'>台積電</a></li>
                <li><a href='#'>台積電</a></li>
                <li><a href='#'>台積電</a></li>
                <li><a href='#'>台積電</a></li>
                <li><a href='#' class="btn-chat">Contact US</a></li>
            </ul>
        </nav>

        <header class="hero">
            <div class="hero-content">
                <h1 id="hero-title">我的未來，由<span class="highlight">Karmen</span>主宰</h1>
                <p>這是我在東吳大學基礎網頁設計課的第一個自製網站，我將學習使用響應式網頁設計的功能</p>

                <div class="chat-box">
                    <input type="text" id="user-input" placeholder="輸入：你好、功能，或『新增 買午餐』">
                    <button id="send-btn" class="btn-primary">發送指令</button>
                </div>
                <p id="ai-response">AI 助理：等待指令中...</p>

                <div class="todo-panel">
                    <h3>📝 待辦事項工具</h3>
                    <div class="todo-input-group">
                        <input type="text" id="todo-input" placeholder="手動輸入提醒事項...">
                        <input type="datetime-local" id="todo-time">
                        <button onclick="handleManualAdd()" class="btn-todo-add">新增</button>
                    </div>
                    <ul id="todo-list"></ul>
                    <button onclick="clearCompletedTodos()" class="btn-clear-completed">🧹 清除已完成項目</button>
                </div>

                <div class="hero-buttons">
                    <button class="btn-primary" onclick="changeColor()">變換顏色</button>
                    <button class="btn-secondary">查看原始碼</button>
                </div>
            </div>
            
            <div class="hero-image">
                <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=800">
            </div>
        </header>
        
        <script src="./java.js"></script>
        <script>(function(){if(!window.chatbase||window.chatbase("getState")!=="initialized"){window.chatbase=(...arguments)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(arguments)};window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})}const onLoad=function(){const script=document.createElement("script");script.src="https://www.chatbase.co/embed.min.js";script.id="8EwTtzZKn1W1GGintwNtR";script.domain="www.chatbase.co";document.body.appendChild(script)};if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}})();</script>
    </body>
</html>
